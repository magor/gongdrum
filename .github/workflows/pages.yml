name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish built site to repository root
        run: |
          cp dist/index.html index.html
          rm -rf assets
          cp -r dist/assets assets
          rm -rf obrazky
          cp -r dist/obrazky obrazky
          cp dist/CNAME CNAME
          cp site/public/.nojekyll .nojekyll

      - name: Commit published site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets obrazky CNAME .nojekyll
          if git diff --staged --quiet; then
            echo "No changes to publish."
          else
            git commit -m "chore(pages): publish built site to repository root"
            git push
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Wait for prior Pages deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="${{ github.repository }}"
          current_sha="${{ github.sha }}"
          max_attempts=40
          poll_seconds=30

          is_blocking_status() {
            case "$1" in
              deployment_in_progress|syncing_files|finished_file_sync|updating_pages|purging_cdn)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          for attempt in $(seq 1 "$max_attempts"); do
            blocked=false

            while IFS= read -r deploy_sha; do
              [ -z "$deploy_sha" ] && continue
              [ "$deploy_sha" = "$current_sha" ] && continue

              status=$(gh api "repos/$repo/pages/deployments/$deploy_sha" --jq -r '.status // empty' 2>/dev/null || true)
              if [ -n "$status" ] && is_blocking_status "$status"; then
                echo "Deployment $deploy_sha is still $status"
                blocked=true
              fi
            done < <(gh api "repos/$repo/commits?per_page=8" --jq '.[].sha' 2>/dev/null || true)

            if [ "$blocked" = false ]; then
              echo "Pages deployment slot is free."
              exit 0
            fi

            echo "Waiting for prior Pages deployment... ($attempt/$max_attempts)"
            sleep "$poll_seconds"
          done

          echo "Timed out waiting for prior Pages deployment."
          exit 1

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Retry deploy after Pages contention
        if: steps.deployment.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="${{ github.repository }}"
          current_sha="${{ github.sha }}"
          max_attempts=10
          poll_seconds=30

          is_blocking_status() {
            case "$1" in
              deployment_in_progress|syncing_files|finished_file_sync|updating_pages|purging_cdn)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          for attempt in $(seq 1 "$max_attempts"); do
            blocked=false

            while IFS= read -r deploy_sha; do
              [ -z "$deploy_sha" ] && continue
              [ "$deploy_sha" = "$current_sha" ] && continue

              status=$(gh api "repos/$repo/pages/deployments/$deploy_sha" --jq -r '.status // empty' 2>/dev/null || true)
              if [ -n "$status" ] && is_blocking_status "$status"; then
                echo "Deployment $deploy_sha is still $status"
                blocked=true
              fi
            done < <(gh api "repos/$repo/commits?per_page=8" --jq '.[].sha' 2>/dev/null || true)

            if [ "$blocked" = false ]; then
              echo "Pages deployment slot is free."
              exit 0
            fi

            echo "Retry wait for prior Pages deployment... ($attempt/$max_attempts)"
            sleep "$poll_seconds"
          done

          echo "Timed out waiting for prior Pages deployment."
          exit 1

      - name: Deploy to GitHub Pages (retry)
        if: steps.deployment.outcome == 'failure'
        id: deployment_retry
        uses: actions/deploy-pages@v4

      - name: Verify deployment succeeded
        run: |
          if [ "${{ steps.deployment.outcome }}" != "success" ] && [ "${{ steps.deployment_retry.outcome }}" != "success" ]; then
            echo "Pages deployment failed."
            exit 1
          fi
